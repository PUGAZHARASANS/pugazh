<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-section">
                <div class="score-label">👤 PLAYER</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <div class="score-label">💻 COMPUTER</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="instructions">
            <h3>⚙️ How to Play</h3>
            <p><strong>Controls:</strong> Move your mouse up/down OR use Arrow Keys ⬆️⬇️</p>
            <p><strong>Goal:</strong> First to 10 points wins!</p>
            <p><strong>Tips:</strong> Hit the ball at different paddle positions for spin • Ball speeds up with each hit</p>
            <p><strong>Computer:</strong> AI opponent with smart tracking</p>
        </div>

        <div id="gameOverMessage">
            <div id="winnerMessage"></div>
            <button onclick="document.getElementById('resetBtn').click()">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
